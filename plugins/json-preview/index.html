<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 12px 14px;
        font: 13px/1.5 "SF Mono", ui-monospace, Menlo, monospace;
        color: #ddd;
        background: #1e1e1e;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      button {
        border: 0;
        background: #2f6fed;
        color: #fff;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      button:disabled {
        background: #3a3a3e;
        cursor: default;
      }
      #status {
        font-size: 12px;
        color: #8a8a8e;
      }
      #status.ok {
        color: #4ec9b0;
      }
      #status.bad {
        color: #e5707a;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <button id="copy" disabled>复制格式化</button>
      <span id="status">读取剪贴板…</span>
    </div>
    <pre id="out"></pre>
    <script>
      let formatted = "";
      const out = document.getElementById("out");
      const status = document.getElementById("status");
      const copyBtn = document.getElementById("copy");

      function setStatus(text, cls) {
        status.textContent = text;
        status.className = cls || "";
      }

      async function run() {
        try {
          const clip = await host.clipboard.read();
          const text = (clip && clip.text) || "";
          if (!text.trim()) {
            out.textContent = "";
            setStatus("剪贴板为空");
            return;
          }
          try {
            const obj = JSON.parse(text);
            formatted = JSON.stringify(obj, null, 2);
            out.textContent = formatted;
            setStatus("✓ 有效 JSON", "ok");
            copyBtn.disabled = false;
          } catch (e) {
            out.textContent = text;
            setStatus("✗ 不是合法 JSON", "bad");
          }
        } catch (e) {
          out.textContent = "";
          setStatus("读取失败: " + (e && e.message), "bad");
        }
      }

      copyBtn.onclick = async () => {
        if (!formatted) return;
        await host.clipboard.write(formatted);
        setStatus("已复制 ✓", "ok");
      };

      run();
    </script>
  </body>
</html>
