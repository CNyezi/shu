[package]
name = "pc-tool"
version = "0.1.0"
description = "Plugin-based launcher (MVP)"
authors = ["yezi"]
edition = "2021"

[lib]
name = "pc_tool_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
arboard = "3"
dirs = "5"
